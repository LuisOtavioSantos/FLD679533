# Configuração completa e autocontida para Produção
spring:
  application:
    name: rest
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://prod-mysql-server:3306/rest_db?useSSL=true&serverTimezone=UTC}
    username: ${DB_USER:prod_user}
    password: ${DB_PASSWORD:prod_password_segura}
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

security:
  jwt:
    # Chave secreta em Base64 (256-bit / 32 bytes).
    secret-key: YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZ2hpams=
    expiration: 36000000

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    com.example.rest: INFO

server:
  port: 8080

app:
  admin:
    email: ${ADMIN_EMAIL:admin@prod.com}
    password: ${ADMIN_PASSWORD:MudarSenhaSeguraProd123!}
  backend-url: ${BACKEND_URL:https://api.seudominio.com}
  ai:
    provider: ${AI_PROVIDER:gemini}
