
services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    # command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: rest_db
      MYSQL_USER: user
      MYSQL_PASSWORD: kwd2%/O.?NSN4ZwWXJ[Z
      MYSQL_ROOT_PASSWORD: kwd2%/O.?NSN4ZwWXJ[Z
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ./mysql:/var/lib/mysql
    networks:
      - backend

networks:
  backend:
    driver: bridge
